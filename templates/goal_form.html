{% extends "base.html" %}
{% block title %}{{ 'Edit' if goal else 'New' }} Goal — FinFamily{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1>{{ 'Edit' if goal else 'New' }} Goal</h1></div>
</div>

<div class="panel" style="max-width: 640px;">
<form method="POST">
  <div class="field">
    <label>Goal Name</label>
    <input type="text" name="name" required value="{{ goal.name if goal else '' }}" placeholder="e.g. Retirement, Child's Education, Home Purchase">
  </div>
  <div class="form-row">
    <div class="field">
      <label>Target Amount (₹)</label>
      <input type="number" step="0.01" name="target_amount" required value="{{ goal.target_amount if goal else '' }}">
    </div>
    <div class="field">
      <label>Target Date</label>
      <input type="date" name="target_date" value="{{ goal.target_date if goal else '' }}">
    </div>
  </div>
  <div class="field">
    <label>Current Monthly Contribution / SIP (₹)</label>
    <input type="number" step="0.01" name="monthly_contribution" value="{{ goal.monthly_contribution if goal else '' }}">
  </div>
  <div class="field">
    <label>Link Assets Funding This Goal</label>
    <div class="checkbox-list">
      {% for a in assets %}
      <label>
        <input type="checkbox" name="linked_assets" value="{{ a.id }}" {{ 'checked' if goal and a in goal.linked_assets else '' }}>
        {{ a.name }} ({{ a.meta.label }}) — ₹{{ (a.current_value or 0) | inr }}
      </label>
      {% endfor %}
    </div>
  </div>
  <div class="field">
    <label>Notes</label>
    <textarea name="notes" rows="2">{{ goal.notes if goal else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-secondary" style="width:100%;">{{ 'Save changes' if goal else 'Create goal' }}</button>
</form>
</div>
{% endblock %}
