{% extends "base.html" %}
{% block title %}Log in — FinFamily{% endblock %}
{% block auth_content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-mark">₹</span>
      <span class="brand-name">FinFamily</span>
    </div>
    <div class="auth-tagline">One family. One net worth. Every asset, in one place.</div>
    <h2>Log in</h2>
    <form method="POST">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary">Log in</button>
    </form>
    <div class="auth-switch">New to FinFamily? <a href="{{ url_for('register') }}">Create a family workspace</a></div>
  </div>
</div>
{% endblock %}
